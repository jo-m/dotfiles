# Strict default jail, usable with claude or with shell.

conf .defaults
mode strict
jail default

# Just to avoid potential confusion.
unsetenv SSH_AUTH_SOCK
unsetenv SSH_ASKPASS

# Make git dir read only.
rdir? ${PWD}/.git

# Allow access to host ~/.claude.
dir! .claude

# Give ro access to chezmoi source dir, and apply on startup.
rdir? .local/share/chezmoi
command chezmoi init --apply --promptString 'name=jai,email=jai@example.org,work_email=jai@example.org,work_git_dir=~/git'; "$0" "$@"
